<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP Contest Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="icon" href="icons/final.png">
    <style>
        * { box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #cdd6f4;
            font-family: 'Consolas', 'Courier New', monospace;
            min-height: 100vh;
            padding: 40px 24px;
        }

        .page-wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #313244;
            padding-bottom: 16px;
            margin-bottom: 28px;
        }

        .page-header .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #89b4fa;
            flex-shrink: 0;
        }

        .page-header h1 {
            font-size: 16px;
            font-weight: 500;
            color: #cdd6f4;
            letter-spacing: 0.4px;
        }

        .page-header .sub {
            margin-left: auto;
            font-size: 11px;
            color: #45475a;
        }

        .contests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .platform-card {
            background: #11111b;
            border: 1px solid #313244;
            border-radius: 8px;
            overflow: hidden;
        }

        .platform-header {
            padding: 12px 16px;
            border-bottom: 1px solid #313244;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .platform-header h2 {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .cf-color { color: #89b4fa; }
        .cc-color { color: #a6e3a1; }
        .lc-color { color: #fab387; }

        .platform-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cf-dot { background: #89b4fa; }
        .cc-dot { background: #a6e3a1; }
        .lc-dot { background: #fab387; }

        .platform-body {
            padding: 12px 16px;
        }

        .contest-item {
            background: #181825;
            border: 1px solid #313244;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            transition: border-color 0.15s;
        }

        .contest-item:last-child { margin-bottom: 0; }
        .contest-item:hover { border-color: #45475a; }

        .contest-item.soon {
            border-left: 3px solid #f38ba8;
            background: #1e1826;
        }

        .contest-name {
            font-size: 12px;
            font-weight: 500;
            color: #cdd6f4;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .contest-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            color: #6c7086;
            margin-bottom: 8px;
        }

        .contest-meta span { display: flex; align-items: center; gap: 3px; }

        .timer { color: #89b4fa; font-variant-numeric: tabular-nums; }
        .timer.soon { color: #f38ba8; }

        .contest-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge-soon {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #3b1219;
            color: #f38ba8;
            border: 1px solid #f38ba8;
            font-weight: 500;
        }

        .badge-dur {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #1e1e2e;
            color: #7f849c;
            border: 1px solid #313244;
        }

        .view-btn {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            text-decoration: none;
            border: 1px solid #313244;
            color: #89b4fa;
            background: transparent;
            transition: all 0.15s;
        }
        .view-btn:hover { background: #313244; border-color: #45475a; }
        .view-btn.cc { color: #a6e3a1; }
        .view-btn.lc { color: #fab387; }

        .loading {
            font-size: 12px;
            color: #45475a;
            padding: 16px 0;
            text-align: center;
        }

        .summary-line {
            font-size: 11px;
            color: #45475a;
            margin-bottom: 10px;
        }

        .error {
            font-size: 12px;
            color: #f38ba8;
            padding: 12px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="page-header">
            <div class="dot"></div>
            <h1>CP Contest Tracker</h1>
            <span class="sub">Build and managed by SK, For CP Community</span>
        </div>

        <div class="contests-grid">
            <div class="platform-card">
                <div class="platform-header">
                    <div class="platform-dot cf-dot"></div>
                    <h2 class="cf-color">Codeforces</h2>
                </div>
                <div class="platform-body">
                    <div id="codeforces-contests"><div class="loading">loading...</div></div>
                </div>
            </div>

            <div class="platform-card">
                <div class="platform-header">
                    <div class="platform-dot cc-dot"></div>
                    <h2 class="cc-color">CodeChef</h2>
                </div>
                <div class="platform-body">
                    <div id="codechef-contests"><div class="loading">loading...</div></div>
                </div>
            </div>

            <div class="platform-card">
                <div class="platform-header">
                    <div class="platform-dot lc-dot"></div>
                    <h2 class="lc-color">LeetCode</h2>
                </div>
                <div class="platform-body">
                    <div id="leetcode-contests"><div class="loading">loading...</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="main.js"></script>
</body>
</html>
